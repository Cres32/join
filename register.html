<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/register.js"></script>
    <style>
        .success-banner {
            position: fixed;
            bottom: -100px; /* Starts off-screen */
            left: 50%;
            transform: translateX(-50%);
            background-color: #2A3647; /* Dark blue from image */
            color: white;
            padding: 24px 48px;
            border-radius: 20px;
            font-size: 32px;
            box-shadow: 0 4px 4px rgba(0, 0, 0, 0.25);
            transition: bottom 0.5s ease-in-out;
            z-index: 999;
        }
        .show-banner {
            bottom: 50px; /* Slides up */
        }

        .d-none {
            display: none;
        }
    </style>
    <title>Register</title>
</head>
<body>
    
    <div id="success-banner" class="success-banner d-none"> 
        <span>You Signed Up successfully</span> 
    </div>

    <section class="main-layout">

        <main class="content">
            <div class="btn-container">
                        <a href="index.html" class="btn-primary" style="text-decoration:none;">Back to Login</a>
            </div>
        </main>

        <footer class="footer">
            <a href="#">Privacy Policy</a>
            <a href="#">Legal notice</a>
        </footer>

    </section>
</body>
</html>
