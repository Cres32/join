</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Sign Up</title>
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./css/app_layout.css">
    <script src="script.js" defer></script>
    <script src="./js/register.js" defer></script>
</head>
<body>
    <div class="main-layout">
        
        <header class="header signup-header"> <!-- Añadimos 'signup-header' -->
            <img src="./assets/img/logo/join_logo.png" alt="Join Logo" class="logo">
        </header>

        <main class="content">
            <div class="card signup-card">
                <!-- Back arrow linking to login -->
                <div class="blue-arrow">
                    <a href="login.html" class="back-arrow">&larr;</a>
                    <h1>Sign up</h1>
                </div>

                <div class="blue-underline"></div>

                <form onsubmit="addUser(); return false;" class="form signup-form">
                    <div class="input-wrapper">
                        <input type="text" id="name" required placeholder="Name">
                        <!-- Generic Person Icon -->
                        <span class="input-icon person-icon">&#128100;</span>
                    </div>

                    <div class="input-wrapper">
                        <input type="email" id="email" required placeholder="Email">
                        <!-- Generic Mail Icon -->
                        <span class="input-icon mail-icon">&#9993;</span>
                    </div>
                    
                    <div class="input-wrapper">
                        <input type="password" id="password" required placeholder="Password">
                        <!-- Generic Lock Icon -->
                        <span class="input-icon lock-icon">&#128274;</span>
                    </div>

                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" required placeholder="Confirm Password">
                        <!-- Generic Lock Icon -->
                        <span class="input-icon lock-icon">&#128274;</span>
                    </div>

                    <div class="privacy-wrapper">
                        <input type="checkbox" id="privacy-policy" onchange="toggleSignupButton()">
                        <label for="privacy-policy">I accept the <a href="#">Privacy policy</a></label>
                    </div>

                    <div class="btn-container">
                        <button type="submit" id="signup-btn" class="btn-primary" disabled>Sign up</button>
                    </div>
                </form>
            </div>
        </main>

        <footer class="footer">
            <a href="#">Privacy Policy</a>
            <a href="#">Legal notice</a>
        </footer>

    </div>

    <div id="success-banner" class="success-banner d-none"> You Signed Up successfully </div>

</body>
</html>
